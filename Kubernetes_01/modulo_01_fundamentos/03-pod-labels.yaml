# ============================================================
# O QUE ESTE ARQUIVO FAZ:
# Demonstra como funcionam as Labels e Filtros (Selectors) 
# O Conceito que dá vida ao Kubernetes moderno.
# ============================================================

# 1. ANALOGIA DO DIA A DIA
# Imagine estar numa sala com 1.000 alunos e você precisa achar todo mundo 
# que vista camiseta "vermelha", cursa o "1º ano" e tem "cabelo loiro".
# Se cada aluno tiver essas coisas escritas em um "adesivo" na testa, 
# você grita "Quem tem o adesivo cor:vermelho pode ir pro intervalo"
# Labels são esses adesivos! Você cola eles no Pod.

# 2. O QUE É (definição técnica Senior)
# Labels (Etiquetas) são pares chave/valor associados a objetos, 
# como os Pods. Elas não possuem semântica própria no core system do K8s
# (não alteram desempenho nem limite de disco), são puramente p/ organizar
# e selecionar subconjuntos de objetos em formato de query para uso p/ 
# Services, Deployments, ou operadores humanos em bulk operations.

# ============================================================
# 3. ARQUIVO YAML COMENTADO
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: meu-pod-pagamento    # Um pod de serviços financeiros por ex.
  namespace: meu-primeiro-projeto
  # AQUÍ ESTÁ O CONCEITO DO ARQUIVO:
  labels:                    # Declaração literal da listagem de adesivos
    aplicacao: financeiro    # Adesivo de filtro por aplicação
    ambiente: producao       # Adesivo de filtro por maturidade do artefato
    squad: time-faturamento  # Adesivo de filtro de equipe proprietária responsavel
    tier: backend            # Adesivo da topologia para regras de rede (Ex: isolar do front)
spec:
  containers:
    - name: api-pagamento
      image: nginx:alpine    # Alpine: Imagem minúscula de SO para rodar o app rápido 
      ports:
        - containerPort: 8080

# ============================================================
# 4. COMANDOS PASSO A PASSO
# ============================================================
# 1. Criar o pod:
#    kubectl apply -f 03-pod-labels.yaml
#
# 2. Listar pods mostrando *todos* os adesivos grudados:
#    kubectl get pods --show-labels -n meu-primeiro-projeto
#
# 3. A MÁGICA: Buscar APENAS pods que sejam do time de faturamento:
#    kubectl get pods -l squad=time-faturamento -n meu-primeiro-projeto
#
# 4. Busca com Multiplos Filtros ("E" Lógico):
#    kubectl get pods -l ambiente=producao,tier=backend -n meu-primeiro-projeto
#
# ============================================================
# 5. VERIFICAÇÃO E TROUBLESHOOTING
# ============================================================
# Tente alterar um LABEL "on-the-fly" direto pelo terminal sem ir pro yaml!
#    kubectl label pod meu-pod-pagamento squad=time-risco --overwrite -n meu-primeiro-projeto
# Verifique em seguida se a query do passo 3 acima retornará vazia, confirmando.
#
# Se for debugar no futuro um "Porquê meu pod de FrontEnd não acha o pod do BD?",
# muito frequentemente um Label tem typo, como "appl: banco" em vez de "app". 

# ============================================================
# 6. CONCEITO SENIOR (o "porquê" profundo)
# ============================================================
# "Label Selector" é possivelmente a engrenagem mais importante da Arquitetura do 
# Kubernetes. No futuro veremos o LoadBalancer (Service), ele não amarra na rede
# por nome de IP e muito menos por Nome do Pod (que muda a toda hora). O Serviço 
# simplesmente olha para o cluster a 1000 por hora e diz: "Qualquer novo Pod vivo que 
# subiu ou ressuscitou e que magicamente tenha a Label 'app: minhaloja' será adicionado 
# por mim na teia da rede. Isso desacopla estritamente os recursos de Infraestrutura.

# ============================================================
# 7. PERGUNTA DE ENTREVISTA
# ============================================================
# Pergunta: "Se nós temos Labels tão vitais, como empresas enormes garantem que 
# nenhum desenvolvedor Junior subirá um Pod sem as Labels obrigatórias como 
# 'owner' ou 'cost-center'?"
# Resposta Esperada: "Normalmente nós usamos um 'Admission Controller' customizado,
# como o OPA/Gatekeeper (Kyverno/Open Policy Agent). Quando o Junior der o deploy,
# antes de deitar os dados no banco Etcd, a API joga para o Gatekeeper e ele diz: 
# 'Error: Faltam labels de finanças' e deruba a pipe, educando o dev sem causar dano 
# ao monitoramento da nuvem do FinOps."
