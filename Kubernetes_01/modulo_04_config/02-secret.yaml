# ============================================================
# O QUE ESTE ARQUIVO FAZ:
# Cria um Secret. Ele é o irmão do ConfigMap, porém voltado 
# estritamente para dados sensíveis. O Kubernetes tem proteções  
# extras com ele.
# ============================================================

# 1. ANALOGIA DO DIA A DIA
# Se o Configmap é o papel post-it amarelo com as regras colado na parede da cozinha 
# para todo mundo ler de passagem (Idiomas, Temas do site, limite de banda)...
#
# O Secret é o "Cofre" com senha nos fundos da casa. Você não enxerga a  
# combinação facilmente abrindo o documento de primeira mão. Apenas quem tem a 
# "Chave Especial" (O Pod Autorizado) pode colocar a mão lá dentro do cofre para  
# sacar a senha do Banco de Dados escondida.

# 2. O QUE É (definição técnica Senior)
# Objects de Secret contém uma pequena quantidade de dados confidenciais tais 
# como chaves SSH, Tokens Oauth ou Passwords. Por padrão nos manifestos, devem ser
# representados não em *plain-text*, mas obrigatoriamente em `base64 encoded`. 

# ============================================================
# 3. ARQUIVO YAML COMENTADO
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: credenciais-do-banco
  namespace: meu-primeiro-projeto
  
type: Opaque                  # Opaque: Quer dizer "Secret simples arbitrário p usuário"
                              # O kubernetes dispõe de tipos especiais (ex: kubernetes.io/tls)

# Todos os valores OBRIGATORIAMENTE precisam antes passar por um conversor Base64
# (Ex linux: 'echo -n "minhaSenhaSegura" | base64')
# Isso não é encriptação. É apenas a forma segura do K8s trafegar a string pela API sem quebrar bytes
data:
  usuario_db: YWRtaW4teC1kYg==        # Representa a palavra 'admin-x-db'
  senha_db: MTIzNDU2QGFiYyFAIyQ=      # Representa a palavra '123456@abc!@#$'

# ============================================================
# 4. COMANDOS PASSO A PASSO
# ============================================================
# 1. Crie o cofre:
#    kubectl apply -f 02-secret.yaml
#
# 2. Veja o "resumo" do cofre (Ele esconderá o Base64 por segurança):
#    kubectl get secret credenciais-do-banco -n meu-primeiro-projeto
#
# 3. Tente dar "describe" como fizemos no ConfigMap para espionar os dados humanos.
#    Descubra que o Kubectl protege você (Ele não imprime senhas no log default):
#    kubectl describe secret credenciais-do-banco -n meu-primeiro-projeto

# ============================================================
# 5. VERIFICAÇÃO E TROUBLESHOOTING
# ============================================================
# E se você PRECISAR muito ver a senha para debugar num incidente?  
# O Kubectl mais moderno traz uma opção focada se você tiver autorizacao suprema:
#   `kubectl get secret credenciais-do-banco -n meu-primeiro-projeto --template={{.data.senha_db}} | base64 -d`
# (Descodifica ao vivo usando pipeline do Linux/Mac)
#
# Erro Junior Mortal: Na hora de gerar o base64 (via console `echo "senha" | base64`)
# eles esquecem a flag `-n`. O console joga um "Enter/Quebra de Linha Invisível (\n)"  
# na string. O Base64 gerado acaba com um Enter no final, e quando o app injeta isso
# no banco o MongoDB recusa dizendo 'senha invalida' com quebra de linha. 
# SEMPRE USE `-n` (no-newline): `echo -n 'senha_correta' | base64`.

# ============================================================
# 6. CONCEITO SENIOR (o "porquê" profundo)
# ============================================================
# "Elias, mas Base64 qualquer macaco traduz na internet! Qual a segurança?"
# Correto. Base64 do Yaml é ofuscação (p/ transporte de special-chars do YAML),
# NÃO encriptação! A segurança real ocorre nos bastidores: O Kube-Apiserver escreve isso
# no Banco Etcd *encriptado fortemente at-rest* se o Admin ligar a tag EncryptionProvider. 
# Outra restrição de segurança do Kubernetes: Secrets injetados em Arquivos criam "TMPFS", 
# e montam a pasta em RAM VOLÁTIL, não no HDD das vms, para que se um hacker roubar
# o HD do servidor, as senhas evaporam pq existem apenas na memória das VMs.

# ============================================================
# 7. PERGUNTA DE ENTREVISTA
# ============================================================
# Pergunta: "Se nós temos um Secret muito perigoso no namespace `pagamentos` contendo 
# as sub-chaves da CIELO/Stripe. Um desenvolvedor pode acidentalmente botar no Pod  
# do namespace `suporte` um link pra importar essas chaves do Secret de cima?"
# Resposta Esperada: "Livremente, Não. Diferente de ClusterRoles que são componentes  
# globais cross-cluster, Objectos base como ConfigMaps e Secrets são hard-bound (amarrados forte)  
# em isolamento pelo seu próprio namespace. Você não consegue montar o volume de um secret  
# `pagamentos` num pod em namespaces alheio de maneira nativa para evitar Data-Leaking 
# e segregação de responsabilidade lógica."
