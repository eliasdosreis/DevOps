# ============================================================
# O QUE ESTE ARQUIVO FAZ:
# Cria um componente espetacular: HPA (Horizontal Pod Autoscaler).
# Configura seu Deployment para escalar (clonar a caixa) 
# automágicamente quando a carga de trabalho de usuários subir!
# ============================================================

# 1. ANALOGIA DO DIA A DIA
# Você é o Gerente da Bilheteria do Cinema.
# Num feriado comum, 1 Máquina de vender Guichê de Pipoca com 1 atendente da conta do trabalho.  
# Mas hoje, sexta-feira de estréia dos Vingadores: Filas Imensas de Estresse! 
# Ao invés de você olhar a fila e ligar pra sua Chefe e pedir pra 
# mandar "Contratar + Mais 3 Pipocamos via Deploy" (Manual).
#
# O (HPA) é um "Scanner Robô na Filac" . A Regra dele é: "Se o nível de Stress e  
# Suor na camisa (CPU%) dos Operadores das Pipocas vigentes passar de  
# '50% de suor' contínuo. EU, O ROBÔ KUBERNETES CLONO ESSE ATENTENDE
# SOZINHO. Posso colocar eles até um teto limite de no maximo de 10 Atendentes!". 

# 2. O QUE É (definição técnica Senior)
# HorizontalPodAutoscaler automatiza o aumento de número de réplicas
# (Scale-Out) e retração de número de réplicas via garbage-collect natural temporal 
# (Scale-In). Baseando-se em observabilidades providas pelo Metrics-Server na matriz
# do controle de `targetCPUUtilizationPercentage` ou memórias e custom metrics Cloud.

# ============================================================
# 3. ARQUIVO YAML COMENTADO
# ============================================================
apiVersion: autoscaling/v2          # API de Auto-scale moderna
kind: HorizontalPodAutoscaler
metadata:
  name: robocop-escala-pipeline
  namespace: meu-primeiro-projeto
spec:
  # QUEM EU VOU VIGIAR E APLICAR AS CLONAGEMS? (Lembro do meu Deployment antigo!)
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-loja                  # Nome Exato daquele `02-deployment.yaml` da Aula 02 
    
  # AS REGRAS DE TETO MACIO
  minReplicas: 1                    # Se ninguem comprar nada de madrugada, desista aos prantos de enxugar pra apagar custo Amazon (Ate 1 sobrar).
  maxReplicas: 10                   # Teto MAXIMO do cluster. Não clona 100 senao quebra o orçamento financeiro!
  
  # A REGRA DE STRESS GATILHO: A Mágica de fato!
  metrics:
  - type: Resource
    resource:
      name: cpu                     # Metrica Foco (O 'suor' na camisa do operario)
      target:
        type: Utilization
        averageUtilization: 50      # Se a Media da CPU dos viventes bater 50% alocada do limit... ESCAAAALA! GERA +1!
        
# ============================================================
# 4. COMANDOS PASSO A PASSO
# ============================================================
# 1. CUIDADO. PARA O HPA FUNCIONAR OBRIGATORIAMENTE O CLUSTER PRECISA 
#    DO PLUGIN "Metrics-Server" instalado nele para dar "Visao do hardware" ao k8s:
#    (No Kind puro, aplique isso pro cluster enxergar CPUs:)
#    kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#
# 2. Invoque as leis e regras o Robocop Escalador:
#    kubectl apply -f 05-hpa.yaml
#
# 3. VER AO VIVO NA TELA O K8S LENDO AS PORCENTAGENS DO USO DE HARDWRE!
#    kubectl get hpa robocop-escala-pipeline -n meu-primeiro-projeto -w
#    (Você verá as colunas `TARGETS` dizendo  `0% / 50%`... Se vc bombardiar de requisições apache-bench o pod... isso baterá os `70% / 50%`... No mesmo exato momemnto a coluna final "REPLICAS" crescera de 1 para 3 magicamente!!)

# ============================================================
# 5. VERIFICAÇÃO E TROUBLESHOOTING
# ============================================================
# DE LEEEENGE O ERRO MAIS ABSURDO DAS TREADS DE INTERNET DO JUNIOR DEVOPS:
# `kubectl get hpa` mostra `TARGETS: <unknown> / 50%`. Unknown não escala NADA!! 
# MOTIVOS DE UNKNOWN DA MORTE:
# 1. O Adm do cluster nunca instalou o Componente de `metrics-server` e o cluster é CEGO.
# 2. **ERRO MESTRE:** Seu Deployment base (ex: `api-loja`) NÂO FOI CRIADO COM O BLOCO
#   `"resources.requests"` de CPU que vimos na Aula_01 daqui do modulo!
#   Pense só: Se o K8s não sabe que o "teto absoluto do request exato" do cpu é 200m.. 
#   como que você, Robô, calculará que '50% foi usado' ??? A conta matemática precisa da BASE PRA DIVISÃO PERCENTUAL ! K8s nao mede o teto geral da maquinna pra porcentagem.

# ============================================================
# 6. CONCEITO SENIOR (o "porquê" profundo)
# ============================================================
# Senior usa HPA para métricas de negócio! Não só via CPU!.
# Hoje na Amazon / GKE... podemos emparelhar o HPA com Ferramentas "CustomMetrics/PrometheusAdapter".
# Seu Robocop PODE escalar PODS se e somente se: "Se na tela de GoogleAnalytics do Site Oficial... bater
# 3mil pessoas logadas de uma vez, mande a CPU do meu servidor do fundo injetar +2 pods antecipadamente antes mesmo 
# deles atacarem nossa api, preditivamente! Baseada Numa Metrica Logica Externa e nao estática Hardware Like".
# O OPA/KEDA Moderno é de explodir cabeças na fluidez.

# ============================================================
# 7. PERGUNTA DE ENTREVISTA
# ============================================================
# Pergunta: "Se nós temos um Autoscaler na Media 50% de TargetCpu, que escalou de 2 pra MAX:10 Pods
# porque entremositou no Jornal Nacional em propaganda. E acabou a propaganda.. E o CPU dos Pods caiam no relogue instantâneamento 
# pra pífios 5%, O HPA matará os 10 recém-nascidos do ar abruptamente aos pares pra voltar as "MinReplicas=2" correndo em milissegundos? "
# Resposta Esperada: "Não. O Kubernetes tem implementado um mecanismo protetivo brutal 
# anti-thrashing (Flapping). Ele chama de Cooldown Period (ScaleDown behavior window). 
# Basicamente ele observará uma taxa congelada da poeira abaixar, esperando um padrão `hardcoded`
# canônico de aprox. 5 minutos inalterado de paz absoluta pra ter coragem de MATAR progressivamente o pool. 
# Previne que a montanha-russa do fluxo mate e recrie infraestruura quebrando o controle manager e desestablizando o cluster."
