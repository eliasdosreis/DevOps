# =============================================================
# ARQUIVO DE CONFIGURAÇÃO: rsync.conf
# Módulo 2 - Intermediário
# Alex DevOps Coach
# =============================================================
#
# 🧒 PARA CRIANÇAS:
# Este arquivo é como a agenda de contatos.
# O script principal lê daqui as informações que precisa.
# Se mudar de servidor, só muda AQUI, não no script!
#
# ⚠️ IMPORTANTE: Este arquivo pode ter senhas/chaves.
#    Nunca coloque no Git! Adicione ao .gitignore
#
# =============================================================

# -------------------------------------------
# CONFIGURAÇÕES DO SERVIDOR
# -------------------------------------------
SERVIDOR="192.168.1.100"     # IP ou hostname do servidor destino
USUARIO="devops"             # Usuário SSH no servidor
PORTA_SSH="22"               # Porta SSH (padrão: 22, mude se necessário)

# -------------------------------------------
# CHAVE SSH
# -------------------------------------------
CHAVE_SSH="$HOME/.ssh/rsync_senior_key"  # Caminho da chave privada

# -------------------------------------------
# DIRETÓRIOS
# -------------------------------------------
PASTA_ORIGEM="$HOME/dados"           # Pasta LOCAL de origem
PASTA_DESTINO="/backup/dados"        # Pasta REMOTA de destino

# -------------------------------------------
# OPÇÕES DO RSYNC
# -------------------------------------------
TIMEOUT_CONEXAO=30       # Segundos para timeout de conexão
MAX_TENTATIVAS=3         # Quantas vezes tentar se falhar
INTERVALO_TENTATIVA=60   # Segundos entre tentativas

# -------------------------------------------
# EXCLUSÕES - Arquivos para NÃO copiar
# -------------------------------------------
# Separados por espaço, com aspas em cada item
EXCLUIR=(
    "*.tmp"           # Arquivos temporários
    "*.log"           # Logs (têm pasta própria)
    ".git/"           # Repositório Git
    "node_modules/"   # Dependências Node (muito pesado!)
    "__pycache__/"    # Cache Python
    ".DS_Store"       # Arquivo do macOS (inútil no Linux)
)

# -------------------------------------------
# CONFIGURAÇÕES DE LOG
# -------------------------------------------
PASTA_LOGS="/var/log/rsync-migracoes"  # Onde salvar os logs
MANTER_LOGS_DIAS=30                    # Apagar logs mais antigos que 30 dias

# -------------------------------------------
# NOTIFICAÇÕES (opcional)
# -------------------------------------------
EMAIL_NOTIFICACAO=""          # Deixe vazio para não enviar email
WEBHOOK_SLACK=""              # URL do webhook do Slack (opcional)
