# =============================================================================
# ARQUIVO DE CONFIGURAÇÃO: migrar.conf
# Sistema de Migração Enterprise
# Alex DevOps Coach
# =============================================================================
#
# 🧒 PARA CRIANÇAS:
# Este arquivo é como um formulário que você preenche.
# O script principal lê este formulário e sabe o que fazer.
#
# ⚠️ SEGURANÇA IMPORTANTE:
# - Nunca coloque senhas aqui!
# - Adicione este arquivo ao .gitignore
# - Permissão recomendada: chmod 600 migrar.conf
#
# =============================================================================

# -------------------------------------------
# SERVIDOR DE DESTINO
# -------------------------------------------
# Onde vão parar os arquivos após a migração

SERVIDOR="prod-backup-01.empresa.com"  # IP ou hostname. Ex: 192.168.1.100
USUARIO="devops-rsync"                 # Usuário com acesso mínimo necessário
PORTA_SSH="2222"                       # Porta SSH (2222 é mais segura que 22)

# -------------------------------------------
# AUTENTICAÇÃO
# -------------------------------------------
CHAVE_SSH="$HOME/.ssh/rsync_senior_key"  # Chave privada ED25519

# -------------------------------------------
# CAMINHOS
# -------------------------------------------
PASTA_ORIGEM="/dados/aplicacao"          # Pasta LOCAL que será migrada
PASTA_DESTINO="/backup/aplicacao"        # Pasta REMOTA de destino

# -------------------------------------------
# COMPORTAMENTO DO RETRY
# -------------------------------------------
MAX_TENTATIVAS=3          # Número máximo de tentativas
INTERVALO_BASE=30         # Segundos base para backoff exponencial
                          # Tentativa 1→2: 30s, 1→3: 60s, 1→4: 120s...

# -------------------------------------------
# VERIFICAÇÃO DE ESPAÇO
# -------------------------------------------
ESPACO_MARGEM=20          # % de margem de segurança (20% = precisa 20% a mais)

# -------------------------------------------
# EXCLUSÕES
# -------------------------------------------
# Padrões de arquivos/pastas para NÃO copiar
# Sintaxe igual ao .gitignore
EXCLUIR=(
    "*.tmp"           # Arquivos temporários
    "*.swp"           # Arquivos temporários do vim
    "*.log"           # Logs (têm destino próprio)
    "*.pid"           # Arquivos de processo
    ".git/"           # Repositório Git
    ".gitignore"      # Arquivo do git
    "node_modules/"   # Dependências Node.js (reinstale no destino!)
    "__pycache__/"    # Cache Python
    "*.pyc"           # Bytecode Python compilado
    ".DS_Store"       # Metadado do macOS
    "Thumbs.db"       # Metadado do Windows
    "*.bak"           # Backups temporários
    "temp/"           # Pasta temporária
    "cache/"          # Pasta de cache
)

# -------------------------------------------
# NOTIFICAÇÕES (opcional)
# -------------------------------------------
# Deixe vazio para desabilitar
EMAIL_NOTIFICACAO=""          # Ex: "devops@empresa.com"
WEBHOOK_SLACK=""              # Ex: "https://hooks.slack.com/services/..."

# =============================================================================
# COMO USAR ESTE ARQUIVO:
#
# 1. Copie para seu servidor: cp migrar.conf.exemplo migrar.conf
# 2. Edite com seus valores: nano migrar.conf
# 3. Proteja o arquivo: chmod 600 migrar.conf
# 4. Execute: ./migrar-enterprise.sh --config migrar.conf
# =============================================================================
