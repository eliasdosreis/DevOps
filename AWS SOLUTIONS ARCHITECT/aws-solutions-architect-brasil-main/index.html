<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="0; url=./site/index.html">
  <title>Abrindo AWS SAA-C03 Study Lab</title>
  <link rel="canonical" href="./site/index.html">
  <style>
    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --ink: #17202a;
      --muted: #657386;
      --line: #dfe6ef;
      --orange: #ff9900;
      --teal: #00a1c9;
      --shadow: 0 18px 45px rgba(23, 32, 42, 0.12);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(255, 153, 0, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(0, 161, 201, 0.12), transparent 32%),
        var(--bg);
    }
    main {
      width: min(680px, calc(100% - 32px));
      padding: 32px;
      border: 1px solid var(--line);
      border-top: 6px solid var(--orange);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }
    .brand-mark {
      display: grid;
      place-items: center;
      width: 56px;
      height: 56px;
      border-radius: 8px;
      color: #111827;
      background: linear-gradient(135deg, #ffb000, #ff7a00);
      font-weight: 900;
      letter-spacing: 0;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(32px, 6vw, 52px);
      line-height: 1;
      letter-spacing: 0;
    }
    p {
      color: var(--muted);
      line-height: 1.7;
    }
    a {
      display: inline-flex;
      min-height: 42px;
      align-items: center;
      margin-top: 12px;
      padding: 0 16px;
      border-radius: 8px;
      color: #111827;
      background: var(--orange);
      font-weight: 800;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="brand-mark">AWS</div>
    <h1>Abrindo o site de estudo SAA-C03.</h1>
    <p>Esta entrada redireciona para o site novo no padrao visual do AWS CLF02.</p>
    <a href="./site/index.html">Abrir site</a>
  </main>
  <script>window.location.replace("./site/index.html");</script>
</body>
</html>
