# ============================================================
# ARQUIVO: 05-secret.yaml
# O QUE É UM SECRET?
#
# Igual ao ConfigMap, mas para dados SENSÍVEIS:
# - Senhas de banco de dados
# - Tokens de API
# - Certificados SSL
# - Chaves SSH
#
# Os valores ficam em BASE64 (NÃO é criptografia real!).
# Base64 é apenas CODIFICAÇÃO, qualquer um pode decodificar.
# A segurança real vem de: RBAC + etcd encryption + Vault
#
# Como gerar base64:
#   echo -n "minha-senha" | base64
#   # Resultado: bWluaGEtc2VuaGE=
# ============================================================

apiVersion: v1
kind: Secret                # Tipo: Secret

metadata:
  name: segredos-da-app
  labels:
    app: minha-app

type: Opaque                # Tipo do secret
                            # Opaque = uso geral (mais comum)
                            # Outros: kubernetes.io/tls,
                            #         kubernetes.io/dockerconfigjson

data:                       # Valores em BASE64 obrigatório!
  DB_PASSWORD: bWluaGEtc2VuaGE=    # "minha-senha" em base64
  DB_USER: YWRtaW4=                # "admin" em base64
  API_KEY: c2VjcmV0LWtleS0xMjM=   # "secret-key-123" em base64

# ALTERNATIVA: usar stringData (Kubernetes converte pra você)
# stringData:
#   DB_PASSWORD: "minha-senha"    # Sem base64!
#   DB_USER: "admin"

---
# ============================================================
# Pod usando o Secret
# ============================================================

apiVersion: v1
kind: Pod

metadata:
  name: pod-com-secret
  labels:
    app: usa-secret

spec:
  containers:
    - name: app
      image: nginx:1.25

      # Usar Secret como variáveis de ambiente
      env:
        - name: DATABASE_PASSWORD     # Nome da env var no container
          valueFrom:
            secretKeyRef:
              name: segredos-da-app   # Nome do Secret
              key: DB_PASSWORD        # Chave dentro do Secret

        - name: DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: segredos-da-app
              key: DB_USER

      # Ou carregar TODOS os valores do secret
      envFrom:
        - secretRef:
            name: segredos-da-app

# ============================================================
# BOAS PRÁTICAS DE SEGURANÇA (NÍVEL SÊNIOR):
#
# 1. NUNCA coloque secrets em código ou git!
#    Use .gitignore para arquivos de secret
#
# 2. Em produção, use ferramentas externas:
#    - HashiCorp Vault (mais popular)
#    - AWS Secrets Manager
#    - Azure Key Vault
#    - Sealed Secrets (encrypt no git)
#
# 3. Habilite encriptação do etcd em repouso
#    (etcd é onde K8s salva tudo)
#
# 4. Use RBAC para limitar quem pode LER secrets
#
# ENTREVISTA SÊNIOR:
# "Secrets são realmente seguros no Kubernetes?"
# RESPOSTA: Por padrão, NÃO. São apenas base64.
# Para segurança real: etcd encryption at rest +
# RBAC restritivo + ferramentas como Vault.
# ============================================================
