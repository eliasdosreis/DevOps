# ============================================================
# ARQUIVO: 11-networkpolicy.yaml
# PROJETO FINAL - Firewall entre Pods (NetworkPolicy)
#
# Por padrão, TODOS os pods podem falar com TODOS.
# Isso é um risco de segurança enorme!
#
# Analogia: Uma empresa onde qualquer funcionário pode
# entrar em qualquer sala, incluindo o cofre do banco.
#
# NetworkPolicy = Crachá de acesso por sala:
# - Frontend só entra na "sala" da API
# - API entra na "sala" do Postgres e Redis
# - Postgres não entra em nenhuma sala (só recebe visitas)
#
# PRÉ-REQUISITO: CNI com suporte a NetworkPolicy
# (Calico, Cilium, WeaveNet - não funciona com Flannel puro)
# ============================================================

# -------------------------------------------------------
# POLÍTICA 1: Bloquear TUDO por padrão (deny-all)
# Esta é a primeira regra: NINGUÉM fala com ninguém!
# Depois abrimos APENAS o necessário.
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: deny-all-default      # Bloquear tudo por padrão
  namespace: ecommerce

spec:
  podSelector: {}             # {} = seleciona TODOS os pods
  policyTypes:
    - Ingress                 # Bloqueia tráfego ENTRANTE
    - Egress                  # Bloqueia tráfego SAINTE

---
# -------------------------------------------------------
# POLÍTICA 2: Frontend só pode chamar a API
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: policy-frontend
  namespace: ecommerce

spec:
  podSelector:                # Esta policy se aplica a:
    matchLabels:
      app: frontend           # Pods com label app=frontend

  policyTypes:
    - Ingress                 # Regras de ENTRADA no frontend
    - Egress                  # Regras de SAÍDA do frontend

  ingress:
    # Frontend recebe tráfego do Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          # Só aceita de pods no namespace do ingress-nginx
      ports:
        - protocol: TCP
          port: 80

  egress:
    # Frontend só pode SAIR para a API
    - to:
        - podSelector:
            matchLabels:
              app: api        # Só para pods da API
      ports:
        - protocol: TCP
          port: 3000          # Porta da API

    # Frontend pode usar DNS (necessário para resolução de nomes!)
    - to: []
      ports:
        - protocol: UDP
          port: 53            # DNS usa porta 53 UDP
        - protocol: TCP
          port: 53

---
# -------------------------------------------------------
# POLÍTICA 3: API pode chamar Postgres e Redis
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: policy-api
  namespace: ecommerce

spec:
  podSelector:
    matchLabels:
      app: api                # Aplica a pods da API

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # API só recebe do Frontend
    - from:
        - podSelector:
            matchLabels:
              app: frontend
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # API pode chamar o Postgres
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

    # API pode chamar o Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # DNS necessário
    - to: []
      ports:
        - protocol: UDP
          port: 53

---
# -------------------------------------------------------
# POLÍTICA 4: Postgres só aceita da API
# -------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: policy-postgres
  namespace: ecommerce

spec:
  podSelector:
    matchLabels:
      app: postgres

  policyTypes:
    - Ingress               # Só configura Ingress (não sai de lugar)

  ingress:
    # Postgres SOMENTE aceita conexões da API
    - from:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - protocol: TCP
          port: 5432

    # NÃO tem regra de Egress = Postgres não inicia conexões

# ============================================================
# MAPA DE COMUNICAÇÃO PERMITIDA:
#
# [Internet] --> [Ingress] --> [Frontend:80]
#                                   │
#                                   ▼ (porta 3000)
#                              [API:3000]
#                                 │   │
#                    (porta 5432) │   │ (porta 6379)
#                                 ▼   ▼
#                           [Postgres] [Redis]
#
# TUDO MAIS É BLOQUEADO!
# Frontend não pode acessar Postgres diretamente.
# Redis não pode acessar nada.
# Postgres não pode acessar nada.
#
# ENTREVISTA SÊNIOR:
# "Como testar se NetworkPolicy está funcionando?"
# RESPOSTA: 
# kubectl run teste --image=busybox --rm -it -- sh
# wget -O- http://postgres:5432  # Deve FALHAR se não for API
# wget -O- http://api:3000       # Deve FUNCIONAR se for Frontend
# ============================================================
