# ==============================================================
# ARQUIVO: ansible.cfg
# MÓDULO 4 - Projeto Final
# ==============================================================
#
# 🧒 EXPLICAÇÃO SIMPLES:
# O ansible.cfg é como as PREFERÊNCIAS do seu aplicativo.
# Você configura uma vez e vale para sempre naquela pasta.
# É como ajustar o som e brilho do celular: feito, pronto!
#
# PRIORIDADE: ansible.cfg > ~/.ansible.cfg > /etc/ansible/ansible.cfg
# (O da pasta atual GANHA das configurações globais!)
# ==============================================================

[defaults]
# Pasta de roles (onde o Ansible procura roles)
roles_path = ./roles

# Arquivo de inventário padrão
# inventory = inventories/producao

# Quantos hosts processar em paralelo (padrão: 5)
# 20 = muito mais rápido para grandes infraestruturas!
forks = 20

# Não mostrar avisos sobre hosts desconhecidos
host_key_checking = False

# Reduzir saída verbosa (mais limpo no CI/CD)
stdout_callback = yaml

# Arquivo de log (útil para auditorias)
log_path = /tmp/ansible-senior-project.log

# Timeout de conexão SSH
timeout = 30

# Usar Python3 por padrão
interpreter_python = auto_silent

[ssh_connection]
# pipelining = True reduz o número de conexões SSH (muito mais rápido!)
# Precisa que "requiretty" esteja desabilitado no sudoers do servidor
pipelining = True

# Multiplicar conexões SSH (reutiliza a mesma conexão)
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

[privilege_escalation]
# Configurações padrão de sudo
become = False          # Não usar sudo por padrão (definir por play)
become_method = sudo    # Método de escalonamento de privilégios
become_ask_pass = False # Não pedir senha do sudo (usar chave SSH)
