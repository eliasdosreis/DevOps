# ==============================================================
# ARQUIVO: inventories/producao/hosts.ini
# MÓDULO 4 - Projeto Final
# ==============================================================
#
# 🧒 EXPLICAÇÃO SIMPLES:
# Este é o inventário de PRODUÇÃO - os servidores reais!
# Separar produção de staging evita erros graves.
# Nunca misture os dois ambientes!
# ==============================================================

# ---- Servidores Web (Nginx + App) ----------------------------
[webservers]
web1 ansible_host=10.0.1.10 ansible_user=ubuntu
web2 ansible_host=10.0.1.11 ansible_user=ubuntu

# ---- Servidores de Banco de Dados ----------------------------
[databases]
db1 ansible_host=10.0.2.10 ansible_user=ubuntu

# ---- Monitoramento -------------------------------------------
[monitoring]
mon1 ansible_host=10.0.3.10 ansible_user=ubuntu

# ---- Grupo Geral de Produção ---------------------------------
[producao:children]
webservers
databases
monitoring

# ---- Variáveis Globais de Produção ---------------------------
[producao:vars]
ambiente=producao
ansible_python_interpreter=/usr/bin/python3
