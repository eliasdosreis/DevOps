# ==============================================================
# ARQUIVO: 01-inventory-simples.ini
# MÓDULO 1 - Fundamentos
# ==============================================================
#
# 🧒 EXPLICAÇÃO SIMPLES:
# O inventário é como sua AGENDA DE CONTATOS do celular.
# Você lista todos os computadores que o Ansible vai gerenciar.
# Sem inventário = Ansible não sabe para onde ir!
#
# 📌 FORMATO: nome_ou_ip ansible_host=IP ansible_user=usuario
# ==============================================================

# Um servidor simples com IP direto
192.168.1.10

# Um servidor com apelido (alias)
# O apelido "webserver1" facilita identificar o servidor
webserver1 ansible_host=192.168.1.11 ansible_user=ubuntu

# Servidor com porta SSH diferente (padrão é 22)
webserver2 ansible_host=192.168.1.12 ansible_port=2222 ansible_user=admin

# Servidor local (o próprio computador que roda o Ansible)
# "connection=local" significa: não precisa de SSH, já está aqui!
localhost ansible_connection=local
