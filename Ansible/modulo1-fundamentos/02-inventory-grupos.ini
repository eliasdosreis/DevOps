# ==============================================================
# ARQUIVO: 02-inventory-grupos.ini
# MÓDULO 1 - Fundamentos
# ==============================================================
#
# 🧒 EXPLICAÇÃO SIMPLES:
# Grupos são como PASTAS no seu celular.
# "Amigos", "Família", "Trabalho" = grupos diferentes.
# Assim você pode mandar mensagem para TODOS de um grupo de uma vez!
#
# 📌 SINTAXE: [nome_do_grupo]
# ==============================================================

# ---- GRUPO: webservers ----------------------------------------
# Todos os servidores web ficam aqui
[webservers]
web1 ansible_host=192.168.1.10 ansible_user=ubuntu
web2 ansible_host=192.168.1.11 ansible_user=ubuntu
web3 ansible_host=192.168.1.12 ansible_user=ubuntu

# ---- GRUPO: databases -----------------------------------------
# Todos os servidores de banco de dados ficam aqui
[databases]
db1 ansible_host=192.168.1.20 ansible_user=admin
db2 ansible_host=192.168.1.21 ansible_user=admin

# ---- GRUPO: loadbalancers -------------------------------------
[loadbalancers]
lb1 ansible_host=192.168.1.5 ansible_user=ubuntu

# ---- GRUPO DE GRUPOS ------------------------------------------
# "production" contém TODOS os grupos acima
# É como uma pasta "Todos os Contatos" que agrupa as outras pastas
[production:children]
webservers
databases
loadbalancers

# ---- VARIÁVEIS PARA UM GRUPO INTEIRO -------------------------
# Todos os servidores do grupo "webservers" usam Python 3
[webservers:vars]
ansible_python_interpreter=/usr/bin/python3

# Todos os bancos usam chave SSH específica
[databases:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_private_key_file=~/.ssh/db_key
