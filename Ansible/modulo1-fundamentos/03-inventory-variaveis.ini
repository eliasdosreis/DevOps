# ==============================================================
# ARQUIVO: 03-inventory-variaveis.ini
# MÓDULO 1 - Fundamentos
# ==============================================================
#
# 🧒 EXPLICAÇÃO SIMPLES:
# Cada servidor tem suas próprias características, como pessoas!
# João tem olhos azuis, Maria tem olhos verdes.
# web1 tem 8GB RAM, web2 tem 16GB RAM.
# Variáveis guardam essas informações individuais!
# ==============================================================

[webservers]
# Cada servidor com suas próprias variáveis
web1 ansible_host=192.168.1.10 ansible_user=ubuntu env=production max_connections=1000
web2 ansible_host=192.168.1.11 ansible_user=ubuntu env=staging  max_connections=500
web3 ansible_host=192.168.1.12 ansible_user=ubuntu env=production max_connections=1000

[databases]
db1 ansible_host=192.168.1.20 ansible_user=admin db_port=5432 db_name=producao
db2 ansible_host=192.168.1.21 ansible_user=admin db_port=5432 db_name=backup

# ---- VARIÁVEIS GLOBAIS (valem para TODOS os hosts) -----------
[all:vars]
# Versão do Python usada em todos os servidores
ansible_python_interpreter=/usr/bin/python3

# Usuário padrão se não especificado
ansible_user=ubuntu

# Timeout de conexão SSH (em segundos)
ansible_ssh_timeout=30
